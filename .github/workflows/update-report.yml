name: Daily Portfolio Report

on:
  schedule:
    - cron: '0 19 * * *'   # 21:00 Madrid (19:00 UTC)
  workflow_dispatch:         # permite lanzarlo manualmente

jobs:
  update-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests yfinance numpy


      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_report.py

      - name: Commit and push
        run: |
          git config user.email "bot@cartera.report"
          git config user.name "Cartera Bot"
          git add reporte_cartera.html historico.json
          git diff --staged --quiet && echo "No changes" || git commit -m "Reporte: $(date '+%d %b %Y %H:%M UTC')"
          git push
